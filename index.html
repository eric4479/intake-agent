<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Intake Agent | Douglas PC</title>
  <link rel="stylesheet" href="https://stijndv.com/fonts/Eudoxus-Sans.css">
  <style>
    :root { 
      --bg: #05080a; 
      --surface: rgba(31, 42, 54, 0.6); 
      --text: #ffffff; 
      --secondary-text: #b0b0b0;
      --accent: #6ab0ff; 
      --primary-blue: #25618b;
      --border: rgba(255, 255, 255, 0.1); 
      --green: #10b981;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      font-family: 'Eudoxus Sans', system-ui, -apple-system, sans-serif; 
      background: var(--bg); 
      color: var(--text); 
      min-height: 100vh; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      padding: 16px;
      background-image: radial-gradient(circle at 50% -20%, #25618b44, transparent 50%),
                        radial-gradient(circle at 0% 100%, #6ab0ff22, transparent 40%);
    }
    
    .app { 
      width: 100%; 
      max-width: 600px; 
      background: var(--surface); 
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 24px; 
      overflow: hidden; 
      border: 1px solid var(--border);
      box-shadow: 0 20px 60px rgba(0,0,0,0.8); 
    }
    
    .topbar { 
      padding: 20px 24px; 
      border-bottom: 1px solid var(--border); 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
    }
    
    .topbar h1 { 
      font-size: 18px; 
      font-weight: 700; 
      letter-spacing: -0.02em;
      text-transform: uppercase;
    }
    
    .modes { 
      display: flex; 
      gap: 6px; 
      background: rgba(0,0,0,0.3); 
      border-radius: 12px; 
      padding: 4px; 
    }
    
    .modes button { 
      padding: 8px 16px; 
      border: none; 
      background: none; 
      color: var(--secondary-text); 
      border-radius: 8px; 
      cursor: pointer; 
      font-size: 13px; 
      font-weight: 500;
      transition: all 0.2s;
    }
    
    .modes button.on { 
      background: var(--primary-blue); 
      color: #fff; 
    }
    
    .chat { 
      height: 420px; 
      overflow-y: auto; 
      padding: 24px; 
      display: flex; 
      flex-direction: column; 
      gap: 16px; 
    }
    
    /* Custom Scrollbar */
    .chat::-webkit-scrollbar { width: 6px; }
    .chat::-webkit-scrollbar-track { background: transparent; }
    .chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    
    .msg { 
      max-width: 85%; 
      padding: 12px 16px; 
      border-radius: 18px; 
      font-size: 15px; 
      line-height: 1.6; 
      animation: in 0.3s ease-out; 
    }
    
    @keyframes in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .msg.agent { 
      align-self: flex-start; 
      background: rgba(255,255,255,0.05); 
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px; 
    }
    
    .msg.user { 
      align-self: flex-end; 
      background: var(--primary-blue); 
      color: #fff; 
      border-bottom-right-radius: 4px; 
    }
    
    .msg.info { 
      align-self: center; 
      background: rgba(106, 176, 255, 0.1); 
      border: 1px solid rgba(106, 176, 255, 0.2); 
      font-size: 13px; 
      color: var(--accent); 
      border-radius: 12px;
    }
    
    .input-row { 
      padding: 16px 24px; 
      border-top: 1px solid var(--border); 
      display: flex; 
      gap: 12px; 
      align-items: center; 
    }
    
    .input-row input { 
      flex: 1; 
      padding: 12px 18px; 
      border-radius: 32px; 
      border: 1px solid var(--border); 
      background: rgba(0,0,0,0.2); 
      color: var(--text); 
      outline: none; 
      font-size: 15px; 
      transition: border-color 0.2s;
    }
    
    .input-row input:focus { 
      border-color: var(--accent); 
    }
    
    .btn { 
      padding: 12px 24px; 
      border-radius: 32px; 
      border: none; 
      cursor: pointer; 
      font-weight: 600; 
      font-size: 14px; 
      transition: all 0.2s;
    }
    
    .btn-send { 
      background: var(--primary-blue); 
      color: #fff; 
    }
    
    .btn-send:hover {
      background: #2d75a8;
      transform: translateY(-1px);
    }
    
    .btn-mic { 
      background: var(--green); 
      color: #000; 
      min-width: 160px; 
      text-align: center; 
    }
    
    .btn-mic.on { 
      background: #ef4444; 
      color: #fff; 
      animation: pulse 1.5s infinite; 
    }
    
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    
    .overlay { 
      display: none; 
      position: fixed; 
      inset: 0; 
      background: rgba(0,0,0,0.85); 
      backdrop-filter: blur(8px);
      z-index: 99; 
      justify-content: center; 
      align-items: center; 
      padding: 16px; 
    }
    
    .overlay.show { display: flex; }
    
    .card { 
      background: #1A232E; 
      border-radius: 32px; 
      padding: 32px; 
      max-width: 560px; 
      width: 100%; 
      max-height: 80vh; 
      overflow-y: auto; 
      border: 1px solid var(--border);
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
    }
    
    .card h3 { 
      margin-bottom: 16px; 
      font-size: 24px;
      letter-spacing: -0.01em;
    }
    
    .card pre { 
      background: rgba(0,0,0,0.3); 
      padding: 20px; 
      border-radius: 16px; 
      font-size: 13px; 
      line-height: 1.6;
      color: var(--secondary-text);
      white-space: pre-wrap; 
      max-height: 350px; 
      overflow-y: auto; 
      border: 1px solid var(--border);
    }
    
    .card .btn { margin-top: 20px; margin-right: 12px; }

    /* Visualizer Styles */
    #voiceInput { flex-direction: column; align-items: center; gap: 16px; }
    .visualizer-container { display: flex; align-items: center; gap: 20px; width: 100%; justify-content: center; }
    #visualizer { 
      background: rgba(0,0,0,0.3); 
      border-radius: 16px; 
      border: 1px solid var(--border); 
    }
    #interim { 
      font-size: 14px; 
      color: var(--secondary-text); 
      min-height: 1.6em; 
      text-align: center; 
      max-width: 85%; 
      line-height: 1.5; 
      padding: 0 20px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <h1>🤖 Project Intake</h1>
      <div class="modes">
        <button id="textBtn" class="on" onclick="setMode('text')">💬 Text</button>
        <button id="voiceBtn" onclick="setMode('voice')">🎤 Voice</button>
      </div>
    </div>
    <div class="chat" id="chat">
      <div class="msg agent">Hello! I'm your Douglas PC intake assistant. Tell me about your business — what do you sell or do? <br><small style="color:var(--secondary-text); font-size: 12px; margin-top: 4px; display: block;">Type below or tap 🎤 for hands-free chat.</small></div>
    </div>
    <div class="input-row" id="textInput">
      <input type="text" id="input" placeholder="How can we help you innovate?" onkeydown="if(event.key==='Enter')send()">
      <button class="btn btn-send" onclick="send()">Send</button>
    </div>
    <div class="input-row" id="voiceInput" style="display:none;">
      <div id="interim">Ready for hands-free chat...</div>
      <div class="visualizer-container">
        <canvas id="visualizer" width="160" height="44"></canvas>
        <button class="btn btn-mic" id="micBtn" onclick="toggleMic()">🎤 Start Hands-free</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="card">
      <h3>✅ Project Brief Ready</h3>
      <pre id="brief"></pre>
      <button class="btn btn-send" onclick="downloadBrief()">Download JSON</button>
      <button class="btn" style="background:rgba(255,255,255,0.05);color:var(--text);border:1px solid var(--border)" onclick="document.getElementById('overlay').classList.remove('show')">Close</button>
    </div>
  </div>

  <script>
    // ===== CONFIG =====
    const API = 'https://intake-agent.douglaspc.workers.dev';

    // ===== SYSTEM PROMPT =====
    const SYSTEM = `You are a friendly project intake assistant for Douglas PC, a technology agency. Your job: have a natural conversation to gather everything needed for a website project.

YOU MUST COLLECT:
1. What the business does / sells
2. Which services they need (Starter Web Presence, Booking & Brand Boost, E-Commerce Launchpad, Brand & Logo Design, Traffic & Marketing Setup, Custom Feature/Integration)
3. Competitors or inspiration sites
4. Do they have a logo/photos? If not, should we AI-generate images? What style?
5. If e-commerce: how many products? Platform preference? Payment gateway?
6. If booking: group events? Attendee limits? Payment at booking?
7. Any other needs

RULES:
- Be warm and concise (1-3 sentences)
- Ask ONE question at a time
- Confirm what you heard before moving on
- When you have ALL information, say exactly: "BRIEF_COMPLETE" and nothing else`;

    let transcript = '';
    let mode = 'text';
    let recognition = null;
    let listening = false;
    let audioCtx, analyser, dataArray, source, animationId;

    // ===== UI =====
    function add(text, role) {
      const d = document.createElement('div');
      d.className = `msg ${role}`;
      d.textContent = text;
      document.getElementById('chat').appendChild(d);
      document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
    }

    function setMode(m) {
      mode = m;
      document.getElementById('textBtn').classList.toggle('on', m === 'text');
      document.getElementById('voiceBtn').classList.toggle('on', m === 'voice');
      document.getElementById('textInput').style.display = m === 'text' ? 'flex' : 'none';
      document.getElementById('voiceInput').style.display = m === 'voice' ? 'flex' : 'none';
      if (m === 'text' && listening) stopMic();
    }

    window.setMode = setMode;

    // ===== TEXT MODE =====
    async function send() {
      const input = document.getElementById('input');
      const text = input.value.trim();
      if (!text) return;
      add(text, 'user');
      input.value = '';
      transcript += `Client: ${text}\n`;
      await callAI();
    }

    window.send = send;

    async function callAI() {
      try {
        const prompt = SYSTEM + `\n\nConversation so far:\n${transcript}\nAssistant:`;
        const res = await fetch(`${API}/api/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: prompt })
        });
        const data = await res.json();
        const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Sorry, try again.';

        if (reply.includes('BRIEF_COMPLETE')) {
          add("Got it! Generating your project brief...", 'info');
          await generateBrief();
        } else {
          add(reply, 'agent');
          transcript += `Assistant: ${reply}\n`;
        }
      } catch (e) {
        add('Connection error. Check your API URL.', 'info');
        console.error(e);
      }
    }

    // ===== VOICE MODE (Web Speech API) =====
    function toggleMic() {
      if (listening) { stopMic(); return; }
      
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        add('Voice not supported in this browser. Try Chrome.', 'info');
        return;
      }
      
      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'en-US';
      
      document.getElementById('interim').textContent = 'Listening...';
      
      recognition.onresult = (e) => {
        let interimTranscript = '';
        for (let i = e.resultIndex; i < e.results.length; ++i) {
          if (e.results[i].isFinal) {
            const text = e.results[i][0].transcript.trim();
            if (text) {
              add(text, 'user');
              transcript += `Client: ${text}\n`;
              callAI();
            }
          } else {
            interimTranscript += e.results[i][0].transcript;
          }
        }
        document.getElementById('interim').textContent = interimTranscript;
      };
      
      recognition.onerror = (e) => {
        if(e.error !== 'no-speech') {
          console.error('Speech error', e.error);
        }
      };
      
      recognition.onend = () => {
        if(listening) {
          try { recognition.start(); } catch(e) {}
        }
      };

      recognition.start();
      listening = true;
      const btn = document.getElementById('micBtn');
      btn.classList.add('on');
      btn.textContent = '🛑 Stop Hands-free';
      startVisualizer();
    }

    function stopMic() {
      listening = false;
      if (recognition) { 
        recognition.onend = null; 
        recognition.stop(); 
        recognition = null; 
      }
      const btn = document.getElementById('micBtn');
      btn.classList.remove('on');
      btn.textContent = '🎤 Start Hands-free';
      document.getElementById('interim').textContent = 'Ready for hands-free chat...';
      stopVisualizer();
    }

    window.toggleMic = toggleMic;

    // ===== VISUALIZER =====
    async function startVisualizer() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        source = audioCtx.createMediaStreamSource(stream);
        source.connect(analyser);
        analyser.fftSize = 64;
        const bufferLength = analyser.frequencyBinCount;
        dataArray = new Uint8Array(bufferLength);
        
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        const draw = () => {
          animationId = requestAnimationFrame(draw);
          analyser.getByteFrequencyData(dataArray);
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          const barWidth = (canvas.width / bufferLength) * 2.5;
          let barHeight;
          let x = 0;
          for(let i = 0; i < bufferLength; i++) {
            barHeight = dataArray[i] / 3;
            ctx.fillStyle = `rgb(106, 176, 255)`;
            ctx.fillRect(x, canvas.height/2 - barHeight/2, barWidth, barHeight);
            x += barWidth + 2;
          }
        };
        draw();
      } catch (e) { console.error('Visualizer error', e); }
    }

    function stopVisualizer() {
      if (animationId) cancelAnimationFrame(animationId);
      if (source) source.disconnect();
      if (audioCtx) audioCtx.close();
    }

    // ===== BRIEF GENERATION =====
    async function generateBrief() {
      try {
        const res = await fetch(`${API}/api/brief`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ transcript })
        });
        const brief = await res.json();
        if (brief.error) { add('Error: ' + brief.error, 'info'); return; }
        document.getElementById('brief').textContent = JSON.stringify(brief, null, 2);
        document.getElementById('overlay').classList.add('show');
        add('✅ Brief generated and saved!', 'info');
      } catch (e) {
        add('Error generating brief.', 'info');
      }
    }

    // ===== DOWNLOAD =====
    window.downloadBrief = function() {
      const text = document.getElementById('brief').textContent;
      const blob = new Blob([text], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'project-brief.json';
      a.click();
    };
  </script>
</body>
</html>
