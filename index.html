<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Intake Agent</title>
  <style>
    :root { --bg: #0f172a; --surface: #1e293b; --text: #f1f5f9; --accent: #38bdf8; --green: #10b981; --border: #334155; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 16px; }
    .app { width: 100%; max-width: 600px; background: var(--surface); border-radius: 16px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
    .topbar { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .topbar h1 { font-size: 16px; }
    .modes { display: flex; gap: 4px; background: var(--bg); border-radius: 8px; padding: 2px; }
    .modes button { padding: 8px 14px; border: none; background: none; color: var(--text); border-radius: 6px; cursor: pointer; font-size: 13px; }
    .modes button.on { background: var(--accent); color: #000; }
    .chat { height: 420px; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; animation: in 0.2s ease; }
    @keyframes in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .msg.agent { align-self: flex-start; background: var(--border); border-bottom-left-radius: 4px; }
    .msg.user { align-self: flex-end; background: var(--accent); color: #000; border-bottom-right-radius: 4px; }
    .msg.info { align-self: center; background: none; border: 1px dashed var(--border); font-size: 12px; color: #94a3b8; }
    .input-row { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: center; }
    .input-row input { flex: 1; padding: 10px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg); color: var(--text); outline: none; font-size: 14px; }
    .input-row input:focus { border-color: var(--accent); }
    .btn { padding: 10px 18px; border-radius: 20px; border: none; cursor: pointer; font-weight: 600; font-size: 14px; }
    .btn-send { background: var(--accent); color: #000; }
    .btn-mic { background: var(--green); color: #000; min-width: 44px; text-align: center; }
    .btn-mic.on { background: #ef4444; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 99; justify-content: center; align-items: center; padding: 16px; }
    .overlay.show { display: flex; }
    .card { background: var(--surface); border-radius: 16px; padding: 24px; max-width: 560px; width: 100%; max-height: 80vh; overflow-y: auto; }
    .card h3 { margin-bottom: 12px; }
    .card pre { background: var(--bg); padding: 14px; border-radius: 8px; font-size: 12px; white-space: pre-wrap; max-height: 350px; overflow-y: auto; }
    .card .btn { margin-top: 12px; margin-right: 8px; }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <h1>🤖 Project Intake</h1>
      <div class="modes">
        <button id="textBtn" class="on" onclick="setMode('text')">💬 Text</button>
        <button id="voiceBtn" onclick="setMode('voice')">🎤 Voice</button>
      </div>
    </div>
    <div class="chat" id="chat">
      <div class="msg agent">Hello! Tell me about your business — what do you sell or do? <br><small>Type below or tap 🎤 to speak.</small></div>
    </div>
    <div class="input-row" id="textInput">
      <input type="text" id="input" placeholder="Type your message..." onkeydown="if(event.key==='Enter')send()">
      <button class="btn btn-send" onclick="send()">Send</button>
    </div>
    <div class="input-row" id="voiceInput" style="display:none; justify-content:center;">
      <button class="btn btn-mic" id="micBtn" onclick="toggleMic()">🎤 Tap to Speak</button>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="card">
      <h3>✅ Project Brief Ready</h3>
      <pre id="brief"></pre>
      <button class="btn btn-send" onclick="downloadBrief()">Download JSON</button>
      <button class="btn" style="background:var(--border);color:var(--text)" onclick="document.getElementById('overlay').classList.remove('show')">Close</button>
    </div>
  </div>

  <script>
    // ===== CONFIG =====
    const API = 'https://voiceintake.douglaspc.workers.dev/'; // CHANGE THIS

    // ===== SYSTEM PROMPT =====
    const SYSTEM = `You are a friendly project intake assistant. Your job: have a natural conversation to gather everything needed for a website project.

YOU MUST COLLECT:
1. What the business does / sells
2. Which services they need (Starter Web Presence, Booking & Brand Boost, E-Commerce Launchpad, Brand & Logo Design, Traffic & Marketing Setup, Custom Feature/Integration)
3. Competitors or inspiration sites
4. Do they have a logo/photos? If not, should we AI-generate images? What style?
5. If e-commerce: how many products? Platform preference? Payment gateway?
6. If booking: group events? Attendee limits? Payment at booking?
7. Any other needs

RULES:
- Be warm and concise (1-3 sentences)
- Ask ONE question at a time
- Confirm what you heard before moving on
- When you have ALL information, say exactly: "BRIEF_COMPLETE" and nothing else`;

    let transcript = '';
    let mode = 'text';
    let recognition = null;
    let listening = false;

    // ===== UI =====
    function add(text, role) {
      const d = document.createElement('div');
      d.className = `msg ${role}`;
      d.textContent = text;
      document.getElementById('chat').appendChild(d);
      document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
    }

    function setMode(m) {
      mode = m;
      document.getElementById('textBtn').classList.toggle('on', m === 'text');
      document.getElementById('voiceBtn').classList.toggle('on', m === 'voice');
      document.getElementById('textInput').style.display = m === 'text' ? 'flex' : 'none';
      document.getElementById('voiceInput').style.display = m === 'voice' ? 'flex' : 'none';
      if (m === 'text' && listening) stopMic();
    }

    window.setMode = setMode;

    // ===== TEXT MODE =====
    async function send() {
      const input = document.getElementById('input');
      const text = input.value.trim();
      if (!text) return;
      add(text, 'user');
      input.value = '';
      transcript += `Client: ${text}\n`;
      await callAI();
    }

    window.send = send;

    async function callAI() {
      try {
        const prompt = SYSTEM + `\n\nConversation so far:\n${transcript}\nAssistant:`;
        const res = await fetch(`${API}/api/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: prompt })
        });
        const data = await res.json();
        const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Sorry, try again.';

        if (reply.includes('BRIEF_COMPLETE')) {
          add("Got it! Generating your project brief...", 'info');
          await generateBrief();
        } else {
          add(reply, 'agent');
          transcript += `Assistant: ${reply}\n`;
        }
      } catch (e) {
        add('Connection error. Check your API URL.', 'info');
        console.error(e);
      }
    }

    // ===== VOICE MODE (Web Speech API - free, built into Chrome) =====
    function toggleMic() {
      if (listening) { stopMic(); return; }
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        add('Voice not supported in this browser. Try Chrome.', 'info');
        return;
      }
      recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.lang = 'en-US';
      recognition.onresult = (e) => {
        const text = e.results[0][0].transcript;
        add(text, 'user');
        transcript += `Client: ${text}\n`;
        callAI();
      };
      recognition.onerror = (e) => {
        add('Voice error: ' + e.error, 'info');
        stopMic();
      };
      recognition.onend = () => stopMic();
      recognition.start();
      listening = true;
      document.getElementById('micBtn').classList.add('on');
      document.getElementById('micBtn').textContent = '🔴 Listening...';
    }

    function stopMic() {
      if (recognition) { recognition.stop(); recognition = null; }
      listening = false;
      const btn = document.getElementById('micBtn');
      btn.classList.remove('on');
      btn.textContent = '🎤 Tap to Speak';
    }

    window.toggleMic = toggleMic;

    // ===== BRIEF GENERATION =====
    async function generateBrief() {
      try {
        const res = await fetch(`${API}/api/brief`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ transcript })
        });
        const brief = await res.json();
        if (brief.error) { add('Error: ' + brief.error, 'info'); return; }
        document.getElementById('brief').textContent = JSON.stringify(brief, null, 2);
        document.getElementById('overlay').classList.add('show');
        add('✅ Brief generated and saved!', 'info');
      } catch (e) {
        add('Error generating brief.', 'info');
      }
    }

    // ===== DOWNLOAD =====
    window.downloadBrief = function() {
      const text = document.getElementById('brief').textContent;
      const blob = new Blob([text], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'project-brief.json';
      a.click();
    };
  </script>
</body>
</html>
